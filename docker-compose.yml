services:
  nina:
    image: carlosrabelo/nina
    container_name: nina-daemon
    restart: unless-stopped
    env_file:
      - .env
      - .env.docker
    environment:
      TZ: ${TZ?missing_TZ}
    ports:
      - "${NINA_HTTP_HOST?missing_NINA_HTTP_HOST}:${NINA_HTTP_PORT?missing_NINA_HTTP_PORT}:${NINA_HTTP_PORT?missing_NINA_HTTP_PORT}"
    volumes:
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: nina-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ?missing_TZ}
      PGTZ: ${TZ?missing_TZ}
    ports:
      - "${POSTGRES_PORT?missing_POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
